<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>StackAI Agent Runs</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0d1117;
    --panel: #131a24;
    --border: #232c38;
    --text: #d7dee8;
    --muted: #7c8898;
    --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    --sans: "IBM Plex Sans", -apple-system, "Segoe UI", sans-serif;
    --amber: #e6a23c;
    --green: #3fb950;
    --red: #f0625a;
    --blue: #58a6ff;
    --grey: #4b5563;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    margin: 0; padding: 32px 40px 80px;
  }
  h1 { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
       color: var(--muted); text-transform: uppercase; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .stat .value { font-family: var(--mono); font-size: 22px; font-weight: 600; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 20px; margin-bottom: 24px; }
  .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 0 0 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
  tr:hover td { background: #17202b; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-family: var(--mono); }
  .pill.succeeded { background: rgba(63,185,80,0.15); color: var(--green); }
  .pill.failed { background: rgba(240,98,90,0.15); color: var(--red); }
  .pill.running, .pill.queued { background: rgba(88,166,255,0.15); color: var(--blue); }
  .pill.cancelled, .pill.cancelling { background: rgba(75,85,99,0.25); color: var(--grey); }
  .row { display: flex; gap: 24px; align-items: flex-start; }
  .row > .panel { flex: 1; min-width: 0; }
  button, input, select {
    font-family: var(--sans); background: #1b2431; border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 7px 10px; font-size: 13px;
  }
  button { cursor: pointer; }
  button:hover { border-color: var(--blue); }
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .toolbar textarea { flex: 1; font-family: var(--mono); font-size: 12px; height: 34px; resize: vertical; }
  .muted { color: var(--muted); }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .trace-link { font-size: 11px; }
  code.small { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
  <h1>StackAI · Agent Runs</h1>
  <div class="subtitle">Cost, reliability, and latency across your agent runs. Data refreshes every 5s.</div>

  <div class="toolbar">
    <textarea id="input-json">{"agent": "research-assistant", "input": {"query": "Summarize our Q2 churn drivers"}}</textarea>
    <button onclick="startRun()">Start run ▸</button>
    <span class="muted" id="start-status"></span>
  </div>

  <div class="grid" id="stat-grid"></div>

  <div class="row">
    <div class="panel">
      <h2>Cost by agent</h2>
      <table><thead><tr><th>Agent</th><th>Runs</th><th>Total cost</th><th>Avg/run</th></tr></thead>
      <tbody id="agent-table"></tbody></table>
    </div>
    <div class="panel">
      <h2>Reliability &amp; latency by step type</h2>
      <table><thead><tr><th>Type</th><th>Count</th><th>Cost</th><th>Avg dur</th><th>Failure rate</th></tr></thead>
      <tbody id="step-table"></tbody></table>
    </div>
  </div>

  <div class="panel">
    <h2>Recent runs</h2>
    <table><thead><tr><th>Run</th><th>Agent</th><th>Status</th><th>Cost</th><th>Tokens</th><th>Duration</th><th>Trace</th></tr></thead>
    <tbody id="runs-table"></tbody></table>
  </div>

<script>
const fmtUsd = (n) => "$" + Number(n ?? 0).toFixed(4);
const fmtMs = (n) => n == null ? "—" : (n > 1000 ? (n/1000).toFixed(2) + "s" : Math.round(n) + "ms");

async function startRun() {
  const statusEl = document.getElementById("start-status");
  try {
    const body = JSON.parse(document.getElementById("input-json").value);
    statusEl.textContent = "starting…";
    const res = await fetch("/v1/runs", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    statusEl.textContent = res.ok ? `started ${data.id}` : `error: ${data.detail || res.status}`;
    setTimeout(refresh, 500);
  } catch (e) {
    statusEl.textContent = "invalid JSON input";
  }
}

async function refresh() {
  const [summary, runs] = await Promise.all([
    fetch("/v1/analytics/summary").then(r => r.json()),
    fetch("/v1/runs?limit=20").then(r => r.json())
  ]);

  document.getElementById("stat-grid").innerHTML = `
    <div class="stat"><div class="label">Runs</div><div class="value">${summary.run_count}</div></div>
    <div class="stat"><div class="label">Success rate</div><div class="value">${(summary.success_rate*100).toFixed(0)}%</div></div>
    <div class="stat"><div class="label">Total cost</div><div class="value">${fmtUsd(summary.total_cost_usd)}</div></div>
    <div class="stat"><div class="label">Tokens (in/out)</div><div class="value" style="font-size:16px">${summary.total_tokens_in.toLocaleString()} / ${summary.total_tokens_out.toLocaleString()}</div></div>
    <div class="stat"><div class="label">p50 duration</div><div class="value">${fmtMs(summary.p50_run_duration_ms)}</div></div>
    <div class="stat"><div class="label">p95 duration</div><div class="value">${fmtMs(summary.p95_run_duration_ms)}</div></div>
  `;

  document.getElementById("agent-table").innerHTML = summary.cost_by_agent.map(a => `
    <tr><td>${a.agent}</td><td>${a.run_count}</td><td>${fmtUsd(a.total_cost_usd)}</td><td>${fmtUsd(a.avg_cost_per_run_usd)}</td></tr>
  `).join("") || `<tr><td colspan="4" class="muted">No runs yet</td></tr>`;

  document.getElementById("step-table").innerHTML = summary.breakdown_by_step_type.map(s => `
    <tr><td>${s.type}</td><td>${s.step_count}</td><td>${fmtUsd(s.total_cost_usd)}</td><td>${fmtMs(s.avg_duration_ms)}</td><td>${(s.failure_rate*100).toFixed(1)}%</td></tr>
  `).join("") || `<tr><td colspan="5" class="muted">No steps yet</td></tr>`;

  document.getElementById("runs-table").innerHTML = runs.data.map(r => `
    <tr>
      <td><a href="#" onclick="return false;" title="${r.id}">${r.id.slice(0,14)}…</a></td>
      <td>${r.agent}</td>
      <td><span class="pill ${r.status}">${r.status}</span></td>
      <td>${fmtUsd(r.cost.total_cost_usd)}</td>
      <td>${r.cost.tokens_in}/${r.cost.tokens_out}</td>
      <td>${fmtMs(r.duration_ms)}</td>
      <td>${r.trace_id ? `<code class="small">${r.trace_id.slice(0,10)}…</code>` : "—"}</td>
    </tr>
  `).join("") || `<tr><td colspan="7" class="muted">No runs yet — start one above.</td></tr>`;
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
